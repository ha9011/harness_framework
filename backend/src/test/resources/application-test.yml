spring:
  datasource:
    url: jdbc:tc:postgresql:16:///test
    username: test
    password: test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 0
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  test:
    database:
      replace: none
