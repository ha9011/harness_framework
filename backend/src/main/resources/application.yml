spring:
  application:
    name: english-app
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://localhost:5432/english_app
    username: app
    password: app1234
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

gemini:
  api-key: ${GEMINI_API_KEY:}

jwt:
  secret: ${JWT_SECRET:dev-secret-key-that-is-at-least-32-characters-long}
  expiration: 86400000
