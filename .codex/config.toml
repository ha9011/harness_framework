# Codex CLI 프로젝트 설정

model = "o3"
approval_policy = "never"                # 하네스 자동 실행 시 승인 프롬프트 없음
sandbox_mode = "danger-full-access"      # 파일 쓰기/명령 실행 전체 허용

# Stop 훅: 하네스 종료 시 lint + build + test 자동 실행
[[hooks.Stop]]
matcher = ""

[[hooks.Stop.hooks]]
type = "command"
command = 'cd "$(git rev-parse --show-toplevel)/harness" && npm run --if-present lint 2>&1 && npm run --if-present build 2>&1 && npm run --if-present test 2>&1'

# PreToolUse 훅: 위험한 Bash 명령어 차단
[[hooks.PreToolUse]]
matcher = "Bash"

[[hooks.PreToolUse.hooks]]
type = "command"
command = """if echo "$CODEX_TOOL_INPUT" | grep -qiE 'rm\\s+(-[a-z]*r[a-z]*\\s+)*-[a-z]*f|rm\\s+(-[a-z]*f[a-z]*\\s+)*-[a-z]*r|git\\s+push\\s+.*--force|git\\s+push\\s+.*-f|git\\s+reset\\s+.*--hard|drop\\s+table'; then echo 'BLOCKED: 위험한 명령어가 감지되었습니다.' >&2; exit 1; fi"""
