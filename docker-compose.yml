version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: english-postgres
    environment:
      POSTGRES_DB: english_app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
